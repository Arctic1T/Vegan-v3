let mainT='All', subT='All';

function buildTabs(){
  const m=['All',...new Set(RECIPES.map(r=>r.ingCat))];
  document.getElementById('mainTabs').innerHTML=m.map(t=>`<div class="tab ${t===mainT?'active':''}" onclick="setMain('${t}')">${t.charAt(0).toUpperCase()+t.slice(1)}</div>`).join('');
  const s=['All',...new Set(RECIPES.filter(r=>mainT==='All'||r.ingCat===mainT).map(r=>r.dishCat))];
  document.getElementById('subTabs').innerHTML=s.map(t=>`<div class="stab ${t===subT?'active':''}" onclick="setSub('${t}')">${t.charAt(0).toUpperCase()+t.slice(1).replace('_',' ')}</div>`).join('');
}

function setMain(t){mainT=t;subT='All';buildTabs();render();}
function setSub(t){subT=t;buildTabs();render();}

function render(data=null){
  const list=data||RECIPES.filter(r=>(mainT==='All'||r.ingCat===mainT)&&(subT==='All'||r.dishCat===subT));
  const g=document.getElementById('grid');
  const e=document.getElementById('empty');
  g.innerHTML='';
  if(list.length===0){e.style.display='block';}else{
    e.style.display='none';
    list.forEach(r=>{
      const div=document.createElement('div');
      div.className='rcard';
      div.onclick=()=>openD(r.id);
      div.innerHTML=`
        <div class="rcard-img" style="background:${bgColors[r.ingCat]||'#fdf2f8'}">${r.emoji}</div>
        <div class="rcard-body">
          <div class="rcard-name">${r.name}</div>
          <div class="rcard-sub">${r.tag} · ${r.time}</div>
          <div class="macros">
            <span class="mc k">${r.cal} Cal</span>
            <span class="mc p">${r.pro}g P</span>
            <span class="mc c">${r.carb}g C</span>
            <span class="mc f">${r.fat}g F</span>
          </div>
        </div>`;
      g.appendChild(div);
    });
  }
  document.getElementById('rbar').innerHTML=`Showing <strong>${list.length}</strong> recipes`;
}

function doSearch(){
  const q=document.getElementById('srch').value.toLowerCase();
  if(!q){render();return;}
  const res=RECIPES.filter(r=>r.name.toLowerCase().includes(q)||r.ingCat.toLowerCase().includes(q)||r.dishCat.toLowerCase().includes(q)||r.ing.some(i=>i.n.toLowerCase().includes(q)));
  render(res);
}

function openD(id){
  const r=RECIPES.find(x=>x.id===id);
  const dv=document.getElementById('dview');
  dv.classList.add('open');
  document.getElementById('listView').style.display='none';
  const rows=r.ing.map(i=>`<tr><td>${i.n}</td><td>${i.a}</td><td style="text-align:right">${i.cal}</td><td style="text-align:right">${i.pro}</td><td style="text-align:right">${i.carb}</td><td style="text-align:right">${i.fat}</td></tr>`).join('');
  const steps=r.steps.map((s,i)=>`<li><div class="snum">${i+1}</div><div>${s}</div></li>`).join('');
  document.getElementById('dcard').innerHTML=`
    <div class="dhero"><div class="dem">${r.emoji}</div><h2>${r.name}</h2><span class="dtag">${r.tag} · ${r.time} · ${r.diff}</span></div>
    <div class="mbar">
      <div class="mcell"><div class="v">${r.cal}</div><div class="l">Calories</div></div>
      <div class="mcell"><div class="v">${r.pro}g</div><div class="l">Protein</div></div>
      <div class="mcell"><div class="v">${r.carb}g</div><div class="l">Carbs</div></div>
      <div class="mcell"><div class="v">${r.fat}g</div><div class="l">Fat</div></div>
    </div>
    <div class="dbody">
      <div class="stitle">Ingredients & nutrition per ingredient</div>
      <div style="overflow-x:auto"><table class="itable"><thead><tr><th>Ingredient</th><th>Amount</th><th style="text-align:right">Cal</th><th style="text-align:right">Protein</th><th style="text-align:right">Carbs</th><th style="text-align:right">Fat</th></tr></thead><tbody>${rows}</tbody></table></div>
      <div class="stitle" style="margin-top:1rem">Instructions</div>
      <ul class="slist">${steps}</ul>
    </div>`;
  dv.scrollIntoView({behavior:'smooth',block:'start'});
}

function closeD(){
  document.getElementById('dview').classList.remove('open');
  document.getElementById('listView').style.display='block';
}

buildTabs();
render();
</script>
